<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0b0b12"/>

  <!-- Back card (rotated, darker) -->
  <rect x="88" y="148" width="288" height="210" rx="22"
        fill="#1c1c2a" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"
        transform="rotate(-7 232 253)"/>

  <!-- Front card (cream) -->
  <rect x="136" y="138" width="288" height="210" rx="22" fill="#fefcf7"/>

  <!-- Lines on front card (sentence with blank) -->
  <rect x="164" y="198" width="100" height="5" rx="2.5" fill="#d4c4a0"/>
  <!-- Blank underline (gold) -->
  <rect x="272" y="198" width="70" height="5" rx="2.5" fill="#c8901a"/>
  <rect x="350" y="198" width="58" height="5" rx="2.5" fill="#d4c4a0"/>

  <rect x="164" y="224" width="240" height="5" rx="2.5" fill="#d4c4a0"/>
  <rect x="164" y="248" width="180" height="5" rx="2.5" fill="#d4c4a0"/>

  <!-- Word badge at bottom of card -->
  <rect x="196" y="280" width="120" height="30" rx="15"
        fill="rgba(200,144,26,0.15)" stroke="rgba(200,144,26,0.4)" stroke-width="1.5"/>
  <rect x="214" y="291" width="84" height="8" rx="4" fill="#c8901a" opacity="0.85"/>

  <!-- Gold sparkle accent top-right of card -->
  <text x="392" y="168" font-size="28" text-anchor="middle" font-family="serif" fill="#c8901a">✦</text>
</svg>
