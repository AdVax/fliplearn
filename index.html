<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlipLearn · بطاقات التعلم</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8901a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlipLearn">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* =============================================
   RESET & VARIABLES
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0b0b12;
  --surf-1:      #13131e;
  --surf-2:      #1c1c2a;
  --surf-3:      #252535;
  --card-bg:     #fefcf7;
  --accent:      #c8901a;
  --accent-lt:   #e8a828;
  --accent-dim:  rgba(200,144,26,.14);
  --txt-1:       #eceae4;
  --txt-2:       #9490a2;
  --txt-3:       #524f60;
  --border:      rgba(255,255,255,.07);
  --danger:      #e05555;
  --success:     #4ec98a;
  --r:           16px;
  --r-sm:        10px;
  --r-lg:        24px;
  --f-ar:        'Tajawal', sans-serif;
  --f-en:        'Playfair Display', serif;
  --ease:        cubic-bezier(.4,0,.2,1);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--f-ar);
  background: var(--bg);
  color: var(--txt-1);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

button { font-family: inherit; border: none; outline: none; background: none; cursor: pointer; }
input, textarea { font-family: inherit; outline: none; border: none; background: none; }

/* =============================================
   APP SHELL
   ============================================= */
#app {
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* =============================================
   SCREENS
   ============================================= */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transition: transform .32s var(--ease), opacity .32s var(--ease);
  will-change: transform, opacity;
}

.screen.slide-right  { transform: translateX(100%);  pointer-events: none; }
.screen.slide-left   { transform: translateX(-28%); opacity: .3; pointer-events: none; }

/* =============================================
   SCROLL
   ============================================= */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll::-webkit-scrollbar { display: none; }

/* =============================================
   TOP BAR
   ============================================= */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: max(14px, env(safe-area-inset-top, 14px)) 18px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.topbar-title {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--surf-2);
  color: var(--txt-1);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .18s, transform .12s;
}
.icon-btn:active { transform: scale(.9); }
.icon-btn:hover  { background: var(--surf-3); }

/* =============================================
   HOME SCREEN
   ============================================= */
.home-head {
  padding: 28px 22px 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.brand-icon {
  width: 42px; height: 42px;
  background: var(--accent);
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21px;
  box-shadow: 0 4px 16px rgba(200,144,26,.35);
}

.brand-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.4px;
}

.brand-name span { color: var(--accent); }

.home-sub {
  font-size: 13px;
  color: var(--txt-2);
  margin-bottom: 22px;
}

/* Stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 4px;
}

.stat-box {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 10px 10px;
}

.stat-val {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-lt);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.stat-lbl {
  font-size: 11px;
  color: var(--txt-2);
  margin-top: 3px;
  font-weight: 500;
}

/* Install Banner */
.install-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 16px 10px;
  padding: 11px 14px;
  background: var(--accent-dim);
  border: 1px solid rgba(200,144,26,.28);
  border-radius: var(--r);
  cursor: pointer;
  transition: opacity .2s;
}
.install-bar.gone { display: none; }
.install-bar-text { flex: 1; }
.install-bar-title { font-size: 13px; font-weight: 700; color: var(--accent-lt); }
.install-bar-sub   { font-size: 11px; color: var(--txt-2); margin-top: 2px; }

/* Section header */
.sec-head {
  padding: 18px 22px 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--txt-3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

/* Deck list */
.deck-list {
  padding: 0 14px 110px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.deck-card {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform .16s, background .16s;
  position: relative;
  overflow: hidden;
  animation: fadeUp .3s var(--ease) both;
}

.deck-card::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity .2s;
}

.deck-card:active { transform: scale(.98); }
.deck-card:hover  { background: var(--surf-2); }
.deck-card:hover::after { opacity: 1; }

.deck-icon {
  width: 50px; height: 50px;
  background: var(--accent-dim);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.deck-info { flex: 1; min-width: 0; }

.deck-name {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.deck-meta {
  font-size: 12px;
  color: var(--txt-2);
  margin-top: 3px;
}

.deck-arr { color: var(--txt-3); flex-shrink: 0; }

/* Empty state */
.empty {
  text-align: center;
  padding: 52px 28px;
}

.empty-ic { font-size: 60px; margin-bottom: 14px; display: block; }
.empty-ti { font-size: 17px; font-weight: 700; margin-bottom: 7px; }
.empty-de { font-size: 13px; color: var(--txt-2); line-height: 1.65; }

/* =============================================
   FAB
   ============================================= */
.fab {
  position: fixed;
  bottom: max(22px, env(safe-area-inset-bottom, 22px));
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  border-radius: 30px;
  height: 54px;
  padding: 0 26px;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 8px 28px rgba(200,144,26,.42);
  transition: transform .15s, box-shadow .15s, background .15s;
  white-space: nowrap;
  z-index: 10;
}
.fab:active { transform: translateX(-50%) scale(.95); box-shadow: 0 4px 16px rgba(200,144,26,.35); }
.fab-plus { font-size: 22px; line-height: 1; margin-bottom: 1px; }

/* =============================================
   DECK DETAIL SCREEN
   ============================================= */
.study-launch {
  margin: 16px 18px 0;
  width: calc(100% - 36px);
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  padding: 18px;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform .15s, opacity .15s;
}
.study-launch:active { transform: scale(.98); }
.study-launch:disabled { opacity: .35; cursor: not-allowed; transform: none; }

.card-list {
  padding: 4px 14px 110px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-row {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 13px 15px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  transition: background .15s;
}
.card-row:hover { background: var(--surf-2); }

.card-row-body { flex: 1; min-width: 0; }

.card-front-txt {
  font-family: var(--f-en);
  font-size: 14px;
  direction: ltr;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-front-txt .bl { color: var(--accent); }

.card-back-txt {
  font-size: 11px;
  color: var(--txt-2);
  margin-top: 3px;
  direction: ltr;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.del-btn {
  color: var(--txt-3);
  padding: 4px;
  border-radius: 6px;
  transition: color .15s;
  flex-shrink: 0;
}
.del-btn:hover { color: var(--danger); }

/* =============================================
   STUDY SCREEN
   ============================================= */
#screen-study { background: var(--bg); }

.study-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: max(14px, env(safe-area-inset-top, 14px)) 16px 12px;
  flex-shrink: 0;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surf-3);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .45s var(--ease);
}

.study-count {
  font-size: 13px;
  font-weight: 700;
  color: var(--txt-2);
  min-width: 36px;
  text-align: center;
}

.shuffle-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 11px;
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--txt-2);
  transition: all .18s;
}
.shuffle-btn.on {
  background: var(--accent-dim);
  border-color: rgba(200,144,26,.5);
  color: var(--accent-lt);
}

.study-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  gap: 18px;
}

/* =============================================
   FLIP CARD
   ============================================= */
.scene {
  perspective: 1100px;
  width: 100%;
  max-width: 460px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.flipper {
  position: relative;
  transform-style: preserve-3d;
  transition: transform .58s cubic-bezier(.35,.1,.25,1.1);
  width: 100%;
  min-height: 240px;
}

.flipper.flipped { transform: rotateY(180deg); }

.face {
  background: var(--card-bg);
  border-radius: 22px;
  box-shadow: 0 18px 56px rgba(0,0,0,.52), 0 0 0 1px rgba(255,255,255,.04);
  padding: 36px 28px 32px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  direction: ltr;
}

.face-back {
  position: absolute;
  inset: 0;
  transform: rotateY(180deg);
  min-height: unset;
}

.face-tag {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #c0ae92;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.face-sentence {
  font-family: var(--f-en);
  font-size: 19px;
  line-height: 1.65;
  color: #2a2420;
  font-weight: 500;
}

.face-sentence .gap {
  display: inline-block;
  min-width: 54px;
  border-bottom: 2.5px solid var(--accent);
  color: #b8a584;
  font-style: italic;
}

.face-sentence .hl {
  color: var(--accent);
  font-weight: 700;
}

.word-badge {
  margin-top: 18px;
  background: rgba(200,144,26,.12);
  border: 1px solid rgba(200,144,26,.28);
  border-radius: 20px;
  padding: 5px 16px;
  font-family: var(--f-en);
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}

.card-note-txt {
  margin-top: 12px;
  font-size: 12px;
  color: #8a7a64;
  font-style: italic;
  font-family: var(--f-ar);
  direction: rtl;
}

/* tap hint */
.tap-hint {
  font-size: 12px;
  color: var(--txt-3);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: opacity .3s;
}

/* nav buttons */
.study-nav {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 460px;
  padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
}

.nav-btn {
  flex: 1;
  height: 50px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surf-1);
  color: var(--txt-1);
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .15s, transform .12s;
}
.nav-btn:active { transform: scale(.97); }
.nav-btn:hover  { background: var(--surf-2); }
.nav-btn:disabled { opacity: .28; cursor: not-allowed; transform: none; }
.nav-btn.gold   { background: var(--accent); border-color: transparent; color: #fff; }
.nav-btn.gold:hover { background: var(--accent-lt); }

/* Done screen */
.done-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 28px;
  text-align: center;
  flex: 1;
}

.done-emoji { font-size: 70px; margin-bottom: 16px; }
.done-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.done-desc  { font-size: 14px; color: var(--txt-2); line-height: 1.7; margin-bottom: 32px; }

.done-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 300px;
}

.btn-main {
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  transition: opacity .15s;
}
.btn-main:active { opacity: .85; }

.btn-sub {
  background: var(--surf-2);
  color: var(--txt-1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 15px;
  font-size: 14px;
  font-weight: 600;
  transition: background .15s;
}
.btn-sub:hover { background: var(--surf-3); }

/* =============================================
   MODAL (bottom sheet)
   ============================================= */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 50;
  display: flex;
  align-items: flex-end;
  transition: opacity .28s var(--ease);
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay.hidden .sheet { transform: translateY(100%); }

.sheet {
  background: var(--surf-1);
  border-radius: 22px 22px 0 0;
  width: 100%;
  padding: 6px 22px max(28px, env(safe-area-inset-bottom, 28px));
  max-height: 93dvh;
  overflow-y: auto;
  transition: transform .3s var(--ease);
  scrollbar-width: none;
}
.sheet::-webkit-scrollbar { display: none; }

.sheet-handle {
  width: 38px; height: 4px;
  background: var(--surf-3);
  border-radius: 2px;
  margin: 8px auto 18px;
}

.sheet-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 18px;
}

/* =============================================
   FORM
   ============================================= */
.fgrp { margin-bottom: 14px; }

.flbl {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--txt-2);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 7px;
}

.finput, .ftarea {
  width: 100%;
  background: var(--surf-2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 13px 14px;
  color: var(--txt-1);
  font-size: 15px;
  transition: border-color .18s;
  resize: none;
}

.finput.ltr, .ftarea.ltr {
  font-family: var(--f-en);
  direction: ltr;
  text-align: left;
}

.finput:focus, .ftarea:focus { border-color: var(--accent); }

.fhint {
  font-size: 11px;
  color: var(--txt-3);
  margin-top: 5px;
}

.fhint code {
  font-family: monospace;
  background: var(--surf-3);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--accent);
  font-size: 12px;
}

.fsubmit {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  margin-top: 10px;
  transition: opacity .15s, transform .12s;
}
.fsubmit:active { opacity: .88; transform: scale(.99); }

/* Emoji grid */
.emoji-row {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  margin-bottom: 14px;
}

.emj-btn {
  aspect-ratio: 1;
  background: var(--surf-2);
  border: 2px solid transparent;
  border-radius: 9px;
  font-size: 19px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .14s;
}
.emj-btn.sel  { border-color: var(--accent); background: var(--accent-dim); }
.emj-btn:active { transform: scale(.88); }

/* =============================================
   CONTEXT MENU
   ============================================= */
.ctx-menu {
  position: fixed;
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  z-index: 200;
  min-width: 180px;
  box-shadow: 0 16px 48px rgba(0,0,0,.55);
  transition: opacity .15s;
}
.ctx-menu.hidden { opacity: 0; pointer-events: none; }

.ctx-item {
  padding: 13px 17px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background .13s;
  color: var(--txt-1);
}
.ctx-item:hover { background: var(--surf-3); }
.ctx-item.red   { color: var(--danger); }

/* =============================================
   TOAST
   ============================================= */
.toast {
  position: fixed;
  bottom: max(88px, calc(env(safe-area-inset-bottom, 0px) + 88px));
  left: 50%;
  transform: translateX(-50%) translateY(18px);
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--txt-1);
  opacity: 0;
  transition: opacity .25s, transform .25s;
  z-index: 300;
  white-space: nowrap;
  pointer-events: none;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* =============================================
   ANIMATIONS
   ============================================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Stagger deck cards */
.deck-card:nth-child(1) { animation-delay: .04s; }
.deck-card:nth-child(2) { animation-delay: .08s; }
.deck-card:nth-child(3) { animation-delay: .12s; }
.deck-card:nth-child(4) { animation-delay: .16s; }
.deck-card:nth-child(5) { animation-delay: .20s; }
.deck-card:nth-child(6) { animation-delay: .24s; }

/* =============================================
   RESPONSIVE
   ============================================= */
@media (min-width: 600px) {
  .sheet { max-width: 480px; margin: auto; border-radius: 22px; }
  .overlay { align-items: center; }
  .study-stage { padding: 32px 48px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ============ HOME SCREEN ============ -->
  <div id="screen-home" class="screen">
    <div class="scroll">
      <div class="home-head">
        <div class="brand">
          <div class="brand-icon">🃏</div>
          <div class="brand-name">Flip<span>Learn</span></div>
        </div>
        <div class="home-sub">بطاقاتك الذكية لحفظ المفردات الإنجليزية</div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-val" id="s-decks">0</div>
            <div class="stat-lbl">مجموعة</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="s-cards">0</div>
            <div class="stat-lbl">بطاقة</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="s-today">0</div>
            <div class="stat-lbl">مراجعة اليوم</div>
          </div>
        </div>
      </div>

      <div id="install-bar" class="install-bar gone">
        <span style="font-size:22px">📲</span>
        <div class="install-bar-text">
          <div class="install-bar-title">ثبّت التطبيق على جهازك</div>
          <div class="install-bar-sub">يعمل بدون إنترنت بعد التثبيت</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <div class="sec-head">مجموعاتك</div>
      <div id="deck-list" class="deck-list"></div>
    </div>

    <button class="fab" id="btn-new-deck">
      <span class="fab-plus">+</span>
      مجموعة جديدة
    </button>
  </div>

  <!-- ============ DECK DETAIL SCREEN ============ -->
  <div id="screen-deck" class="screen slide-right">
    <div class="topbar">
      <button class="icon-btn" id="btn-back">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="topbar-title" id="deck-title">المجموعة</div>
      <button class="icon-btn" id="btn-deck-menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="5" r="1.2"/><circle cx="12" cy="12" r="1.2"/><circle cx="12" cy="19" r="1.2"/></svg>
      </button>
    </div>
    <div class="scroll">
      <button id="btn-study" class="study-launch" disabled>
        ابدأ المراجعة
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <div class="sec-head">البطاقات</div>
      <div id="card-list" class="card-list"></div>
    </div>
    <button class="fab" id="btn-new-card">
      <span class="fab-plus">+</span>
      بطاقة جديدة
    </button>
  </div>

  <!-- ============ STUDY SCREEN ============ -->
  <div id="screen-study" class="screen slide-right">
    <div class="study-bar">
      <button class="icon-btn" id="btn-exit">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="study-count" id="study-cnt">0/0</div>
      <button class="shuffle-btn" id="btn-shuffle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        خلط
      </button>
    </div>
    <div class="study-stage" id="study-stage"></div>
  </div>

  <!-- ============ MODAL: NEW/EDIT DECK ============ -->
  <div class="overlay hidden" id="modal-deck">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="mdeck-title">مجموعة جديدة</div>
      <div class="emoji-row" id="emoji-grid"></div>
      <div class="fgrp">
        <label class="flbl">اسم المجموعة</label>
        <input class="finput" id="in-dname" type="text" placeholder="مثال: كلمات يومية، عمل، سفر...">
      </div>
      <div class="fgrp">
        <label class="flbl">وصف (اختياري)</label>
        <input class="finput" id="in-ddesc" type="text" placeholder="موضوع المجموعة">
      </div>
      <button class="fsubmit" id="btn-save-deck">حفظ المجموعة</button>
    </div>
  </div>

  <!-- ============ MODAL: NEW/EDIT CARD ============ -->
  <div class="overlay hidden" id="modal-card">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="mcard-title">بطاقة جديدة</div>

      <div class="fgrp">
        <label class="flbl">الوجه الأمامي — الجملة مع الفراغ</label>
        <textarea class="ftarea ltr" id="in-front" rows="3"
          placeholder="I need to ___ my keys every morning."></textarea>
        <div class="fhint">ضع <code>___</code> مكان الكلمة الجديدة</div>
      </div>

      <div class="fgrp">
        <label class="flbl">الوجه الخلفي — الجملة الكاملة</label>
        <textarea class="ftarea ltr" id="in-back" rows="3"
          placeholder="I need to find my keys every morning."></textarea>
      </div>

      <div class="fgrp">
        <label class="flbl">الكلمة الجديدة</label>
        <input class="finput ltr" id="in-word" type="text" placeholder="find">
        <div class="fhint">ستظهر مميزة بالذهبي على الوجه الخلفي</div>
      </div>

      <div class="fgrp">
        <label class="flbl">ملاحظة بالعربي (اختياري)</label>
        <input class="finput" id="in-note" type="text" placeholder="مثال: تُستخدم للتعبير عن البحث">
      </div>

      <button class="fsubmit" id="btn-save-card">حفظ البطاقة</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="ctx-menu hidden" id="ctx">
    <div class="ctx-item" id="ctx-edit">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      تعديل المجموعة
    </div>
    <div class="ctx-item red" id="ctx-del">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      حذف المجموعة
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div><!-- #app -->

<script>
/* ============================================================
   FLIPLEARN · Main Application Script
   ============================================================ */

// ─── Helpers ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── State ──────────────────────────────────────────────────
const S = {
  decks:         [],
  activeDeckId:  null,
  studyCards:    [],
  studyIdx:      0,
  isFlipped:     false,
  shuffle:       false,
  studyDone:     false,
  editDeckId:    null,
  editCardId:    null,
  selEmoji:      '📚',
  studiedToday:  0,
  lastDate:      '',
};

const EMOJIS = ['📚','🧠','💬','✈️','🍕','🏢','🎯','💼','🌍','🎓',
                '🔥','⭐','🎮','🏋️','🎵','💡','🌱','🚀','🍎','🌟'];

// ─── Storage ────────────────────────────────────────────────
function persist() {
  localStorage.setItem('fl_v1', JSON.stringify({
    decks: S.decks,
    studiedToday: S.studiedToday,
    lastDate: S.lastDate,
  }));
}

function hydrate() {
  try {
    const raw = localStorage.getItem('fl_v1');
    if (!raw) return;
    const d = JSON.parse(raw);
    S.decks = d.decks || [];
    const today = new Date().toDateString();
    S.studiedToday = (d.lastDate === today) ? (d.studiedToday || 0) : 0;
    S.lastDate = today;
  } catch(e) { console.warn('hydrate error', e); }
}

// ─── Getters ────────────────────────────────────────────────
const getDeck = id => S.decks.find(d => d.id === id);
const activeDeck = () => getDeck(S.activeDeckId);
const totalCards = () => S.decks.reduce((n, d) => n + d.cards.length, 0);

// ─── Screens ────────────────────────────────────────────────
function show(name) {
  ['home','deck','study'].forEach(s => {
    const el = $(`screen-${s}`);
    el.classList.remove('slide-right','slide-left');
    if (s !== name) el.classList.add('slide-right');
  });
}

function navHome() {
  show('home');
  renderHome();
}

function navDeck(id) {
  S.activeDeckId = id;
  $('screen-home').classList.add('slide-left');
  $('screen-deck').classList.remove('slide-right');
  renderDeck();
}

function navStudy() {
  const deck = activeDeck();
  if (!deck || !deck.cards.length) return;
  S.studyCards = [...deck.cards];
  if (S.shuffle) shuffleArr(S.studyCards);
  S.studyIdx   = 0;
  S.isFlipped  = false;
  S.studyDone  = false;
  $('screen-deck').classList.add('slide-left');
  $('screen-study').classList.remove('slide-right');
  renderStudy();
}

// ─── Shuffle ────────────────────────────────────────────────
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

// ─── Render: Home ───────────────────────────────────────────
function renderHome() {
  $('s-decks').textContent = S.decks.length;
  $('s-cards').textContent = totalCards();
  $('s-today').textContent = S.studiedToday;

  const list = $('deck-list');
  list.innerHTML = '';

  if (!S.decks.length) {
    list.innerHTML = `
      <div class="empty">
        <span class="empty-ic">🃏</span>
        <div class="empty-ti">لا توجد مجموعات بعد</div>
        <div class="empty-de">أنشئ مجموعتك الأولى<br>وابدأ رحلة تعلم الإنجليزية</div>
      </div>`;
    return;
  }

  S.decks.forEach(deck => {
    const div = document.createElement('div');
    div.className = 'deck-card';
    div.innerHTML = `
      <div class="deck-icon">${deck.emoji || '📚'}</div>
      <div class="deck-info">
        <div class="deck-name">${escHtml(deck.name)}</div>
        <div class="deck-meta">${deck.cards.length} بطاقة${deck.desc ? ' · ' + escHtml(deck.desc) : ''}</div>
      </div>
      <div class="deck-arr">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    div.addEventListener('click', () => navDeck(deck.id));
    list.appendChild(div);
  });
}

// ─── Render: Deck ───────────────────────────────────────────
function renderDeck() {
  const deck = activeDeck();
  if (!deck) return;

  $('deck-title').textContent = deck.name;
  $('btn-study').disabled = deck.cards.length === 0;

  const list = $('card-list');
  list.innerHTML = '';

  if (!deck.cards.length) {
    list.innerHTML = `
      <div class="empty">
        <span class="empty-ic">✏️</span>
        <div class="empty-ti">لا توجد بطاقات</div>
        <div class="empty-de">أضف بطاقتك الأولى<br>بالضغط على زر + بالأسفل</div>
      </div>`;
    return;
  }

  deck.cards.forEach(card => {
    const row = document.createElement('div');
    row.className = 'card-row';
    const frontPreview = escHtml(card.front).replace(/___/g, '<span class="bl">___</span>');
    row.innerHTML = `
      <div class="card-row-body">
        <div class="card-front-txt">${frontPreview}</div>
        <div class="card-back-txt">${escHtml(card.back)}</div>
      </div>
      <button class="del-btn" data-id="${card.id}" title="حذف">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
          <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </button>`;
    row.querySelector('.card-row-body').addEventListener('click', () => openEditCard(card));
    row.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      deleteCard(card.id);
    });
    list.appendChild(row);
  });
}

// ─── Render: Study ──────────────────────────────────────────
function renderStudy() {
  if (S.studyDone) { renderDone(); return; }

  const card  = S.studyCards[S.studyIdx];
  const total = S.studyCards.length;
  const idx   = S.studyIdx;

  $('prog-fill').style.width = (idx / total * 100) + '%';
  $('study-cnt').textContent = `${idx + 1}/${total}`;
  $('btn-shuffle').classList.toggle('on', S.shuffle);

  // Build front HTML
  const frontHtml = escHtml(card.front).replace(/___/g, '<span class="gap">___</span>');

  // Build back HTML — highlight the keyword
  let backHtml = escHtml(card.back);
  if (card.word) {
    const re = new RegExp(`\\b${escRe(escHtml(card.word))}\\b`, 'gi');
    backHtml = backHtml.replace(re, m => `<span class="hl">${m}</span>`);
  }

  const stage = $('study-stage');
  stage.innerHTML = `
    <div class="scene" id="scene">
      <div class="flipper${S.isFlipped ? ' flipped' : ''}" id="flipper">

        <!-- FRONT -->
        <div class="face">
          <div class="face-tag">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            الوجه الأمامي
          </div>
          <div class="face-sentence">${frontHtml}</div>
        </div>

        <!-- BACK -->
        <div class="face face-back">
          <div class="face-tag" style="color:#c0ae92">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#c8901a" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            الوجه الخلفي
          </div>
          <div class="face-sentence">${backHtml}</div>
          ${card.word ? `<div class="word-badge">${escHtml(card.word)}</div>` : ''}
          ${card.note ? `<div class="card-note-txt">📝 ${escHtml(card.note)}</div>` : ''}
        </div>

      </div>
    </div>

    <div class="tap-hint" id="tap-hint" style="opacity:${S.isFlipped ? 0 : 1}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 10.5V5a2 2 0 0 1 4 0v5.5M11 5a2 2 0 0 1 4 0v3M15 8a2 2 0 0 1 4 0v6a7 7 0 0 1-7 7H8a7 7 0 0 1-5-3L1 15"/></svg>
      اضغط على البطاقة للكشف
    </div>

    <div class="study-nav">
      <button class="nav-btn" id="btn-prev" ${idx === 0 ? 'disabled' : ''}>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        السابق
      </button>
      <button class="nav-btn gold" id="btn-next">
        ${idx === total - 1 ? 'إنهاء ✓' : 'التالي'}
        ${idx < total - 1 ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' : ''}
      </button>
    </div>`;

  // Flip on tap
  $('scene').addEventListener('click', () => {
    S.isFlipped = !S.isFlipped;
    $('flipper').classList.toggle('flipped', S.isFlipped);
    const hint = $('tap-hint');
    if (hint) hint.style.opacity = S.isFlipped ? 0 : 1;
  });

  $('btn-next').addEventListener('click', () => {
    if (S.studyIdx === S.studyCards.length - 1) {
      // Done
      S.studiedToday += S.studyCards.length;
      S.lastDate = new Date().toDateString();
      persist();
      S.studyDone = true;
      renderStudy();
    } else {
      S.studyIdx++;
      S.isFlipped = false;
      renderStudy();
    }
  });

  $('btn-prev').addEventListener('click', () => {
    if (S.studyIdx > 0) {
      S.studyIdx--;
      S.isFlipped = false;
      renderStudy();
    }
  });
}

function renderDone() {
  const total = S.studyCards.length;
  $('prog-fill').style.width = '100%';
  $('study-cnt').textContent = `${total}/${total}`;

  $('study-stage').innerHTML = `
    <div class="done-wrap">
      <div class="done-emoji">🎉</div>
      <div class="done-title">أحسنت يا مجد!</div>
      <div class="done-desc">راجعت ${total} بطاقة اليوم.<br>الاستمرار هو سر النجاح في اللغات!</div>
      <div class="done-btns">
        <button class="btn-main" id="btn-again">مراجعة مجدداً</button>
        <button class="btn-sub"  id="btn-to-deck">العودة للمجموعة</button>
      </div>
    </div>`;

  $('btn-again').addEventListener('click', () => {
    S.studyCards = [...activeDeck().cards];
    if (S.shuffle) shuffleArr(S.studyCards);
    S.studyIdx  = 0;
    S.isFlipped = false;
    S.studyDone = false;
    renderStudy();
  });

  $('btn-to-deck').addEventListener('click', () => {
    $('screen-study').classList.add('slide-right');
    $('screen-deck').classList.remove('slide-left');
  });
}

// ─── Modals ─────────────────────────────────────────────────
function openModal(id) {
  $(id).classList.remove('hidden');
}
function closeModal(id) {
  $(id).classList.add('hidden');
}

// Deck modal
function openNewDeck() {
  S.editDeckId = null;
  S.selEmoji   = '📚';
  $('mdeck-title').textContent = 'مجموعة جديدة';
  $('in-dname').value = '';
  $('in-ddesc').value = '';
  buildEmojiGrid();
  openModal('modal-deck');
  setTimeout(() => $('in-dname').focus(), 320);
}

function openEditDeck() {
  const d = activeDeck();
  S.editDeckId = d.id;
  S.selEmoji   = d.emoji || '📚';
  $('mdeck-title').textContent = 'تعديل المجموعة';
  $('in-dname').value = d.name;
  $('in-ddesc').value = d.desc || '';
  buildEmojiGrid();
  openModal('modal-deck');
}

function buildEmojiGrid() {
  const g = $('emoji-grid');
  g.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emj-btn' + (e === S.selEmoji ? ' sel' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      S.selEmoji = e;
      buildEmojiGrid();
    });
    g.appendChild(btn);
  });
}

function saveDeck() {
  const name = $('in-dname').value.trim();
  if (!name) { toast('أدخل اسم المجموعة'); return; }

  if (S.editDeckId) {
    const d = getDeck(S.editDeckId);
    d.name  = name;
    d.desc  = $('in-ddesc').value.trim();
    d.emoji = S.selEmoji;
    toast('تم تحديث المجموعة ✓');
  } else {
    S.decks.unshift({
      id: uid(), name,
      desc:  $('in-ddesc').value.trim(),
      emoji: S.selEmoji,
      cards: [],
      ts:    Date.now(),
    });
    toast('تمت إضافة المجموعة ✓');
  }

  persist();
  closeModal('modal-deck');

  // refresh whichever screen is active
  if ($('screen-deck').classList.contains('slide-right') || S.activeDeckId === S.editDeckId) {
    renderDeck();
  }
  renderHome(); // always refresh stats
}

// Card modal
function openNewCard() {
  S.editCardId = null;
  $('mcard-title').textContent = 'بطاقة جديدة';
  $('in-front').value = '';
  $('in-back').value  = '';
  $('in-word').value  = '';
  $('in-note').value  = '';
  openModal('modal-card');
  setTimeout(() => $('in-front').focus(), 320);
}

function openEditCard(card) {
  S.editCardId = card.id;
  $('mcard-title').textContent = 'تعديل البطاقة';
  $('in-front').value = card.front;
  $('in-back').value  = card.back;
  $('in-word').value  = card.word  || '';
  $('in-note').value  = card.note  || '';
  openModal('modal-card');
}

function saveCard() {
  const front = $('in-front').value.trim();
  const back  = $('in-back').value.trim();
  const word  = $('in-word').value.trim();
  const note  = $('in-note').value.trim();

  if (!front || !back)        { toast('أدخل الجملتين أولاً'); return; }
  if (!front.includes('___')) { toast('ضع ___ مكان الكلمة الجديدة'); return; }

  const deck = activeDeck();

  if (S.editCardId) {
    const c = deck.cards.find(c => c.id === S.editCardId);
    Object.assign(c, { front, back, word, note });
    toast('تم تحديث البطاقة ✓');
  } else {
    deck.cards.push({ id: uid(), front, back, word, note, ts: Date.now() });
    toast('تمت إضافة البطاقة ✓');
  }

  persist();
  closeModal('modal-card');
  renderDeck();
}

function deleteCard(cardId) {
  if (!confirm('حذف هذه البطاقة؟')) return;
  const deck = activeDeck();
  deck.cards = deck.cards.filter(c => c.id !== cardId);
  persist();
  renderDeck();
  toast('تم حذف البطاقة');
}

function deleteDeck() {
  const d = activeDeck();
  if (!confirm(`حذف مجموعة "${d.name}" وكل بطاقاتها؟`)) return;
  S.decks = S.decks.filter(x => x.id !== S.activeDeckId);
  persist();
  navHome();
  toast('تم حذف المجموعة');
}

// ─── Toast ──────────────────────────────────────────────────
let _toastTmr;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(_toastTmr);
  _toastTmr = setTimeout(() => t.classList.remove('on'), 2600);
}

// ─── Context Menu ────────────────────────────────────────────
let _ctxOpen = false;
function showCtx(e) {
  const m = $('ctx');
  m.classList.remove('hidden');
  // Position below the button
  const rect = e.currentTarget.getBoundingClientRect();
  m.style.top  = (rect.bottom + 6) + 'px';
  m.style.left  = '50%';
  m.style.transform = 'translateX(-50%)';
  _ctxOpen = true;
  e.stopPropagation();
}
function hideCtx() { $('ctx').classList.add('hidden'); _ctxOpen = false; }

// ─── Events ──────────────────────────────────────────────────
function initEvents() {
  // Home
  $('btn-new-deck').addEventListener('click', openNewDeck);

  // Deck detail
  $('btn-back').addEventListener('click', () => {
    $('screen-deck').classList.add('slide-right');
    $('screen-home').classList.remove('slide-left');
    renderHome();
  });
  $('btn-deck-menu').addEventListener('click', showCtx);
  $('btn-study').addEventListener('click', navStudy);
  $('btn-new-card').addEventListener('click', openNewCard);

  // Study
  $('btn-exit').addEventListener('click', () => {
    $('screen-study').classList.add('slide-right');
    $('screen-deck').classList.remove('slide-left');
  });
  $('btn-shuffle').addEventListener('click', e => {
    S.shuffle = !S.shuffle;
    e.currentTarget.classList.toggle('on', S.shuffle);
    toast(S.shuffle ? 'تم تفعيل الخلط العشوائي' : 'تم إلغاء الخلط');
  });

  // Modals — save
  $('btn-save-deck').addEventListener('click', saveDeck);
  $('btn-save-card').addEventListener('click', saveCard);

  // Modals — close on backdrop
  ['modal-deck','modal-card'].forEach(id => {
    $(id).addEventListener('click', e => { if (e.target === $(id)) closeModal(id); });
  });

  // Context menu
  $('ctx-edit').addEventListener('click', () => { hideCtx(); openEditDeck(); });
  $('ctx-del').addEventListener('click',  () => { hideCtx(); deleteDeck(); });
  document.addEventListener('click', () => { if (_ctxOpen) hideCtx(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal('modal-deck');
      closeModal('modal-card');
      hideCtx();
    }
    // Study shortcuts (spacebar = flip, arrows = nav)
    if (!$('screen-study').classList.contains('slide-right') && !S.studyDone) {
      if (e.key === ' ') { e.preventDefault(); $('scene')?.click(); }
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const btn = e.key === 'ArrowRight' ? $('btn-next') : $('btn-prev');
        btn?.click();
      }
    }
  });

  // Enter in deck name input
  $('in-dname').addEventListener('keydown', e => { if (e.key === 'Enter') saveDeck(); });

  // PWA install prompt
  let _deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    $('install-bar').classList.remove('gone');
  });
  $('install-bar').addEventListener('click', async () => {
    if (!_deferredPrompt) return;
    _deferredPrompt.prompt();
    await _deferredPrompt.userChoice;
    _deferredPrompt = null;
    $('install-bar').classList.add('gone');
  });
  window.addEventListener('appinstalled', () => {
    $('install-bar').classList.add('gone');
  });
}

// ─── SW Registration ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .catch(err => console.warn('SW:', err));
}

// ─── Bootstrap ───────────────────────────────────────────────
hydrate();
renderHome();
initEvents();
</script>
</body>
</html>
