name: 🏗️ Build FlipLearn APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Java 17 (required by AGP 8.5+) ────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 3. Android SDK ────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📱 Install Android SDK 35 & Build Tools
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root="${ANDROID_HOME}"

      # ─── 4. Gradle 8.7 (compatible with AGP 8.5.x) ────────────
      - name: 🔧 Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # ─── 5. SVG → PNG converter ────────────────────────────────
      - name: 🖼️ Install SVG tools (librsvg)
        run: sudo apt-get install -y librsvg2-bin

      # ─── 6. Copy PWA files to Android assets ───────────────────
      - name: 📂 Copy PWA files into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html    android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/
          cp sw.js         android/app/src/main/assets/
          cp icon.svg      android/app/src/main/assets/
          cp icon-maskable.svg android/app/src/main/assets/

      # ─── 7. Generate launcher icons from SVG ───────────────────
      #   Android needs PNG icons at 5 densities
      - name: 🎨 Generate PNG launcher icons from SVG
        run: |
          declare -A SIZES=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          for FOLDER in "${!SIZES[@]}"; do
            SIZE=${SIZES[$FOLDER]}
            DEST="android/app/src/main/res/$FOLDER"
            mkdir -p "$DEST"
            rsvg-convert -w $SIZE -h $SIZE icon.svg -o "$DEST/ic_launcher.png"
            rsvg-convert -w $SIZE -h $SIZE icon-maskable.svg -o "$DEST/ic_launcher_round.png"
            echo "✅ $FOLDER: ${SIZE}x${SIZE}px"
          done

      # ─── 8. Build Debug APK ────────────────────────────────────
      - name: 🏗️ Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      # ─── 9. Upload APK as artifact ─────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipLearn-Debug-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ─── Optional: Show APK size ───────────────────────────────
      - name: 📊 APK info
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK built successfully! Size: $SIZE"

